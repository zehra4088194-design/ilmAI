# Optional: only needed if you deploy via the `wrangler` CLI instead of
# pasting worker.js directly into the Cloudflare dashboard (both work fine).
name = "ilm-ai1"
main = "worker.js"
compatibility_date = "2024-09-23"

# Secrets are NOT set here (never commit real keys).
