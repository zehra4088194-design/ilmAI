name: Release check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-placeholder
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-placeholder
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      AI_GATEWAY_URL: http://127.0.0.1:8787
      AI_GATEWAY_SECRET: ci-gateway-secret
      OCR_SERVICE_URL: http://127.0.0.1:8000
      OCR_SERVICE_SECRET: ci-ocr-secret
      CRON_SECRET: ci-cron-secret

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Oracle Compose
        run: docker compose --env-file .env.oracle.example -f docker-compose.oracle.yml config --quiet

      - name: Validate release files
        run: npm run check:release

      - name: Check TypeScript
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --run
