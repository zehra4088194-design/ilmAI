<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#0a0118" />
    <title>ilm AI - Offline</title>
    <style>
      :root { color-scheme: dark; font-family: Georgia, 'Times New Roman', serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; color: #f8fafc; background: radial-gradient(circle at 20% 15%, #283b68 0, transparent 32%), radial-gradient(circle at 85% 80%, #7c2d12 0, transparent 30%), #090d19; }
      main { width: min(92vw, 560px); padding: 42px; border: 1px solid rgba(255,255,255,.16); border-radius: 28px; background: rgba(9,13,25,.82); box-shadow: 0 28px 90px rgba(0,0,0,.45); backdrop-filter: blur(18px); }
      .mark { display: inline-grid; place-items: center; width: 54px; height: 54px; border-radius: 18px; background: #f97316; color: #111827; font: 800 28px/1 sans-serif; }
      h1 { margin: 26px 0 12px; font-size: clamp(2rem, 8vw, 3.5rem); line-height: .95; }
      p { margin: 0; color: #cbd5e1; font: 1rem/1.7 sans-serif; }
      button { margin-top: 28px; padding: 13px 20px; border: 0; border-radius: 999px; color: #111827; background: #fb923c; font: 700 15px/1 sans-serif; cursor: pointer; }
    </style>
  </head>
  <body>
    <main>
      <span class="mark">i</span>
      <h1>Connection ka intezar hai.</h1>
      <p>Downloaded resources device par available rahenge. Live AI, chat aur synced progress ke liye internet reconnect karo.</p>
      <button type="button" onclick="location.reload()">Dobara try karo</button>
    </main>
  </body>
</html>
